<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <title>Arkana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="headerLeft">
            <img src="logo.png" alt="Arkana Logo" class="headerLogo">
            <button class="headerButtonLeft" id="PricingButton">Pricing</button>
            <button class="headerButtonLeft" id="ResourcesButton">Resources</button>
            <button class="headerButtonLeft" id="CommunityButton">Community</button>
            <button class="headerButtonLeft" id="DownloadButton">Download</button>
        </div>
        <div class="headerRight">
            <button class="headerButtonRight" id="SignInButton">Sign In</button>
            <button class="headerButtonRight" id="SignoutButton">Sign Out</button>
        </div>
    </div>
    <h1>
        Arkana App
    </h1>
    <h3>
        The Arkana App is a revolutionary application that allows you to manage your tasks efficiently and effectively. 
        With its user-friendly interface and powerful features, you can stay organized and productive like never before.
    </h3>

    
</body>
</html>
